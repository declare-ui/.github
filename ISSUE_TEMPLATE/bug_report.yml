name: Bug Report
description: Report a bug in DeclareUI
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill in the details below.
  - type: input
    id: version
    attributes:
      label: DeclareUI Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Build Target
      options:
        - React
        - Vue
        - Angular
        - Svelte
        - Web Components
        - Vanilla JS/TS
        - All
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create a component with...
        2. Run `declareui build`...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
